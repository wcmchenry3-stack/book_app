services:
  - type: web
    name: bookshelf-api
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    preDeployCommand: alembic upgrade head
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookshelf-db
          property: connectionString
      - key: ENVIRONMENT
        value: production

  - type: web
    name: bookshelf-web
    env: static
    region: oregon
    buildCommand: npm install && npx expo export --platform web
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://bookshelf-api-rxp3.onrender.com

databases:
  - name: bookshelf-db
    plan: basic-256mb
    region: oregon
