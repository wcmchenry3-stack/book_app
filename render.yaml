services:
  - type: web
    name: bookshelf-api
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    preDeployCommand: alembic upgrade head
    healthCheckPath: /health
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookshelf-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["https://bookshelfai.buffingchi.com"]'
      - key: TRUSTED_HOSTS
        value: '["bookshelfapi.buffingchi.com"]'
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: web
    name: bookshelf-web
    env: static
    region: oregon
    branch: dev
    buildCommand: npm ci && printf "EXPO_PUBLIC_API_URL=%s\nEXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=%s\nEXPO_PUBLIC_SENTRY_DSN=%s\nEXPO_PUBLIC_ENVIRONMENT=%s\n" "$EXPO_PUBLIC_API_URL" "$EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID" "$EXPO_PUBLIC_SENTRY_DSN" "$EXPO_PUBLIC_ENVIRONMENT" > .env && npx expo export --platform web --clear
    staticPublishPath: dist
    rootDir: frontend
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin-allow-popups
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: 'max-age=31536000; includeSubDomains'
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; img-src 'self' https: data:; connect-src 'self' https://bookshelfapi.buffingchi.com; style-src 'self' 'unsafe-inline'; script-src 'self'"
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: 'public, max-age=31536000, immutable'
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://bookshelfapi.buffingchi.com
      - key: EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID
        sync: false
      - key: EXPO_PUBLIC_SENTRY_DSN
        sync: false
      - key: EXPO_PUBLIC_ENVIRONMENT
        value: production

databases:
  - name: bookshelf-db
    plan: basic-256mb
    region: oregon
