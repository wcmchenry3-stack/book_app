appId: com.buffingchi.bookshelf
name: Scan — camera capture flow
tags:
  - scan
  - camera
---
# Precondition: app is launched and user is logged in.
# The scan tab should be visible in the bottom navigation.

# Navigate to scan tab
- tapOn:
    text: "Camera"

# Verify camera view is visible with capture controls
- assertVisible:
    text: "Camera"
- assertVisible:
    label: "Capture book cover"
- assertVisible:
    label: "Flip camera"

# Tap the capture button — on a real device this takes a photo;
# on simulator it captures a still from the simulated camera feed.
- tapOn:
    label: "Capture book cover"

# After capture, the controls should remain visible (no blocking spinner)
- assertVisible:
    label: "Capture book cover"
- assertVisible:
    label: "Flip camera"

# Background search banner should appear
- assertVisible:
    text: "Searching in background.*"
    optional: true
    timeout: 5000
