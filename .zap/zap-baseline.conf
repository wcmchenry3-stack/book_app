# ZAP Baseline Configuration — passive scan settings for post-deploy check
# Used by the deploy pipeline (passive scan only, safe for production).
# Active scan configuration lives in .github/workflows/security.yml.

# Suppress the Authorization header value from being logged in ZAP reports
# (the replacer entry below zeroes it out in scan output only — actual
# requests still carry the real token).
replacer.full_list(0).description=Redact Authorization header from scan logs
replacer.full_list(0).enabled=true
replacer.full_list(0).matchtype=REQ_HEADER_STR
replacer.full_list(0).matchstr=Authorization
replacer.full_list(0).regex=false
replacer.full_list(0).replacement=Authorization: [REDACTED]
