services:
  - type: web
    name: bookshelf-api
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    preDeployCommand: alembic upgrade head
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookshelf-db
          property: connectionString
      - key: ENVIRONMENT
        value: production

  - type: web
    name: bookshelf-api-staging
    env: python
    region: oregon
    plan: starter
    branch: dev
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    preDeployCommand: alembic upgrade head
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookshelf-db-staging
          property: connectionString
      - key: ENVIRONMENT
        value: staging

databases:
  - name: bookshelf-db
    plan: starter
    region: oregon

  - name: bookshelf-db-staging
    plan: starter
    region: oregon
