name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  gate-main-source:
    uses: wcmchenry3-stack/.github/.github/workflows/called-gate-main-source.yml@main
    secrets: inherit

  openai-policy:
    uses: wcmchenry3-stack/.github/.github/workflows/called-openai-policy.yml@main
    secrets: inherit

  secret-scan:
    uses: wcmchenry3-stack/.github/.github/workflows/called-secret-scan.yml@main
    secrets: inherit

  lint-python:
    uses: wcmchenry3-stack/.github/.github/workflows/called-lint-python.yml@main
    with:
      working-directory: backend
    secrets: inherit

  lint-frontend:
    uses: wcmchenry3-stack/.github/.github/workflows/called-lint-frontend.yml@main
    with:
      working-directory: frontend
      run-a11y: true
    secrets: inherit

  test-python:
    uses: wcmchenry3-stack/.github/.github/workflows/called-test-python.yml@main
    with:
      working-directory: backend
      coverage-threshold: 80
    secrets: inherit

  test-frontend:
    uses: wcmchenry3-stack/.github/.github/workflows/called-test-frontend.yml@main
    with:
      working-directory: frontend
      coverage-threshold: 80
    secrets: inherit

  cve-python:
    uses: wcmchenry3-stack/.github/.github/workflows/called-cve-python.yml@main
    with:
      working-directory: backend
    secrets: inherit

  cve-frontend:
    uses: wcmchenry3-stack/.github/.github/workflows/called-cve-frontend.yml@main
    with:
      working-directory: frontend
      # Expo 51 bundles a vulnerable version of `send` inside @expo/cli.
      # Threshold kept at `critical` until the Expo 51→55 upgrade lands.
      # tar CVEs already mitigated via package.json overrides.
      audit-level: critical
    secrets: inherit

  sast-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install bandit
        run: pip install bandit[toml]==1.8.3
      - name: Run Bandit SAST
        run: bandit -r app/ -c .bandit -ll --format json -o bandit-report.json || true
      - name: Fail on HIGH or MEDIUM severity findings
        run: |
          python -c "
          import json, sys
          with open('bandit-report.json') as f:
              report = json.load(f)
          issues = report.get('results', [])
          high = [i for i in issues if i['issue_severity'] in ('HIGH', 'MEDIUM')]
          if high:
              for i in high:
                  print(f\"FAIL [{i['issue_severity']}] {i['issue_text']} — {i['filename']}:{i['line_number']}\")
              sys.exit(1)
          print(f'Bandit OK: {len(issues)} total issues, 0 HIGH/MEDIUM.')
          "
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json
          retention-days: 30

  test-migrations:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Upgrade to head
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: alembic upgrade head
      - name: Check for unmigrated model changes
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: alembic check
      - name: Smoke-test downgrade
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: alembic downgrade -1

