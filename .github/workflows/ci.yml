name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Check formatting (black)
        run: black --check backend/

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Dependency CVE scan (pip-audit)
        run: pip-audit -r backend/requirements.txt

      - name: Run tests with coverage
        run: pytest backend/tests/ --cov=app --cov-fail-under=80
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
          ALLOWED_EMAILS: test@example.com

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint (ESLint + a11y)
        run: cd frontend && npx eslint .

      - name: Check formatting (Prettier)
        run: cd frontend && npx prettier --check .

      - name: Run tests with coverage
        run: cd frontend && npx jest --coverage --coverageThreshold='{"global":{"lines":80}}'
