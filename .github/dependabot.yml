version: 2
updates:
  # ── Python backend ──────────────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      # Security CVE fixes get their own group so they can be merged fast
      # without waiting for a routine minor/patch batch.
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major version upgrades for core framework deps require deliberate
      # migration work — keep them out of auto-PRs.
      - dependency-name: "fastapi"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sqlalchemy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pydantic"
        update-types: ["version-update:semver-major"]
      - dependency-name: "alembic"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "backend"

  # ── Frontend npm ─────────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      expo-ecosystem:
        applies-to: version-updates
        patterns:
          - "expo*"
          - "@expo/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Expo SDK and React Native upgrades require native module compatibility
      # testing and coordinated migration — handled manually on a dedicated branch.
      - dependency-name: "expo"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "react-native"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "frontend"

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Los_Angeles"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
